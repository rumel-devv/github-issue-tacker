<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | Page</title>
    <!-- Font awosome -->
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
        <!-- Daisy UI + Talwind -->
<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <main>
   <header class="max-w-11/12 mx-auto p-3">
        <div class="flex-col space-y-2.5 md:flex md:flex-row   justify-between items-center" >
            <div class="flex gap-4 items-center">
            <img  src="./assets/github-logo.png" alt="logo" class="w-10">
            <h2 class="text-2xl font-semibold">GitHub Issues Tracker</h2>
            </div>
            <div>
      <div class="join">
  <div>
    <label class="input validator join-item">
        <i class="fa-solid fa-magnifying-glass"></i>
 <input id="input-field" class="border-0" type="text"  placeholder= "Search issue" required /> 
    </label>
  </div>
  <button  id="search-btn" class="btn btn-primary join-item">Search</button>
</div>
            </div>
        </div>
   </header>
    
    <div id="btnsDiv" class="flex gap-6 w-10/12 mx-auto mt-5 bg-gray-100 p-5 rounded-lg">
        <button class="btn btn-sm  btn-outline" data-id="all">All</button>
        <button class="btn btn-sm  btn-outline" data-id="open">Open</button>
        <button class="btn btn-sm  btn-outline" data-id="close">Close</button>
    </div>
    
   <div class=" flex justify-between items-center gap-2 w-10/12 mx-auto mt-8 bg-gray-100 p-6 rounded-lg">
          <div class="flex gap-5">
            <img src="./assets/Aperture.png" >
            <div>
                <h3 id="total-issue" class="text-xl font-semibold">50 issue</h3>
                <p class="text-xs">Track and manage your project issues</p>
            </div>
          </div>
          <div class="flex gap-2">
            <div class="flex items-center gap-1 justify-center">
                <img src="./assets/Open-Status.png" class="w-3"> 
                <p>Open</p>
            </div>
            <div class="flex items-center gap-1 justify-center">
                <img src="./assets/Closed- Status .png" class="w-3">
                <p>Closed</p>
            </div>
          </div>
   </div>

<section class="max-w-10/12 mx-auto mt-8">
 <div id="cardDiv" class="grid grid-cols-1  md:grid-cols-2 xl:grid-cols-4 gap-4">
    <div class="bg-gray-100 p-2 space-y-4 py-4 rounded-sm">
       <!-- Dynamic Card -->
     </div>
     </div>
     
 </div>
</section>

</main>
   

    <script src="./home.js"></script>
</body>
</html>
